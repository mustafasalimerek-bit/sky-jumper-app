<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0c29">
<title>Sky Jumper</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{
    background:#0a0a1f;
    display:flex;align-items:center;justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:#fff;touch-action:none;
  }
  #game{
    position:relative;width:400px;height:640px;
    max-width:100vw;max-height:100vh;
    background:linear-gradient(180deg,#0f0c29 0%,#302b63 50%,#24243e 100%);
    border-radius:24px;overflow:hidden;
    box-shadow:0 20px 60px rgba(138,43,226,0.45),0 0 0 1px rgba(255,255,255,0.05);
  }
  canvas{display:block;width:100%;height:100%;}
  .ui{
    position:absolute;top:0;left:0;right:0;
    padding:22px 24px;z-index:10;pointer-events:none;
    display:flex;justify-content:space-between;align-items:flex-start;
  }
  .score{font-size:34px;font-weight:900;letter-spacing:-1px;text-shadow:0 2px 14px rgba(0,0,0,0.9);}
  .high{font-size:11px;opacity:0.6;margin-top:2px;letter-spacing:2px;font-weight:600;}
  .premium-badge{
    background:linear-gradient(45deg,#ffd700,#ff9500);
    padding:4px 10px;border-radius:12px;
    font-size:10px;font-weight:800;letter-spacing:1px;
    box-shadow:0 4px 12px rgba(255,215,0,0.4);
    display:none;
  }
  .premium-badge.active{display:block;}
  .overlay{
    position:absolute;inset:0;
    background:rgba(10,10,31,0.55);
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    z-index:20;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    padding:24px;
  }
  .overlay h1{
    font-size:52px;font-weight:900;letter-spacing:4px;
    background:linear-gradient(45deg,#ff00ff,#00ffff);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;
    margin-bottom:12px;text-align:center;line-height:0.95;
    filter:drop-shadow(0 4px 20px rgba(255,0,255,0.4));
  }
  .overlay p{margin-bottom:24px;opacity:0.8;font-size:14px;text-align:center;line-height:1.5;}
  .btn{
    width:100%;max-width:280px;
    padding:15px 24px;
    border:none;border-radius:30px;
    color:#fff;font-size:14px;font-weight:800;letter-spacing:2px;
    cursor:pointer;margin-bottom:10px;
    box-shadow:0 8px 22px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.25);
    transition:transform 0.15s;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .btn:active{transform:scale(0.96);}
  .btn-primary{background:linear-gradient(45deg,#ff00ff,#00ffff);box-shadow:0 8px 22px rgba(255,0,255,0.45);}
  .btn-ad{background:linear-gradient(45deg,#10b981,#059669);box-shadow:0 8px 22px rgba(16,185,129,0.4);}
  .btn-premium{background:linear-gradient(45deg,#ffd700,#ff9500);color:#1a0a00;box-shadow:0 8px 22px rgba(255,215,0,0.45);}
  .btn-tip{background:linear-gradient(45deg,#ff6b6b,#ee5a52);box-shadow:0 8px 22px rgba(255,107,107,0.4);}
  .btn-secondary{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);}
  .btn-icon{font-size:18px;line-height:1;}
  .btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;}
  .hidden{display:none!important;}
  .badge{
    display:inline-block;padding:6px 16px;
    background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;font-size:10px;letter-spacing:3px;font-weight:700;
    margin-bottom:18px;text-transform:uppercase;
  }
  .badge.gold{background:linear-gradient(45deg,rgba(255,215,0,0.15),rgba(255,149,0,0.15));border-color:rgba(255,215,0,0.4);color:#ffd700;}
  .legend{display:flex;gap:14px;margin-bottom:30px;flex-wrap:wrap;justify-content:center;}
  .leg{display:flex;align-items:center;gap:6px;font-size:11px;opacity:0.85;}
  .dot{width:14px;height:6px;border-radius:2px;}

  /* Fake ad overlay */
  .ad-overlay{
    position:fixed;inset:0;background:#000;z-index:100;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    color:#fff;text-align:center;padding:30px;
  }
  .ad-content{max-width:340px;width:100%;}
  .ad-label{
    background:#facc15;color:#000;
    padding:4px 10px;border-radius:6px;
    font-size:11px;font-weight:800;letter-spacing:2px;
    display:inline-block;margin-bottom:24px;
  }
  .ad-mock{
    background:linear-gradient(135deg,#7c3aed,#ec4899);
    aspect-ratio:1;width:100%;border-radius:16px;
    display:flex;align-items:center;justify-content:center;
    font-size:48px;margin-bottom:20px;
    animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.03);}}
  .ad-title{font-size:18px;font-weight:700;margin-bottom:8px;}
  .ad-sub{font-size:13px;opacity:0.7;margin-bottom:20px;}
  .ad-timer{
    background:rgba(255,255,255,0.1);border-radius:20px;
    padding:10px 20px;font-size:14px;font-weight:600;
    display:inline-block;
  }
  .toast{
    position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,0.85);color:#fff;
    padding:14px 24px;border-radius:30px;
    font-size:13px;font-weight:600;
    z-index:200;backdrop-filter:blur(8px);
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    opacity:0;transition:opacity 0.3s,transform 0.3s;
    pointer-events:none;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-10px);}
  .price{font-size:11px;opacity:0.85;margin-left:6px;font-weight:600;}
</style>
</head>
<body>
<div id="game">
  <canvas id="c"></canvas>
  <div class="ui">
    <div>
      <div class="score" id="score">0</div>
      <div class="high">BEST <span id="high">0</span></div>
    </div>
    <div class="premium-badge" id="premiumBadge">★ PREMIUM</div>
  </div>

  <div class="overlay" id="start">
    <span class="badge">Arcade · Neon</span>
    <h1>SKY<br>JUMPER</h1>
    <p>← → tuşları veya parmağınla hareket et<br>Sonsuza dek yüksel!</p>
    <div class="legend">
      <div class="leg"><div class="dot" style="background:#a78bfa"></div>Normal</div>
      <div class="leg"><div class="dot" style="background:#ffd700"></div>Yay</div>
      <div class="leg"><div class="dot" style="background:#00ffff"></div>Hareketli</div>
      <div class="leg"><div class="dot" style="background:#ff4080"></div>Kırılır</div>
      <div class="leg"><div class="dot" style="background:#ff0033"></div>Ölüm <span style="opacity:0.55;font-size:9px;letter-spacing:1px;">50K+</span></div>
    </div>
    <button class="btn btn-primary" onclick="startGame()">OYNA</button>
  </div>

  <div class="overlay hidden" id="over">
    <span class="badge" id="badge">Game Over</span>
    <h1 id="overTitle">GAME<br>OVER</h1>
    <p>Skor <strong id="finalScore" style="font-size:32px;display:block;margin-top:6px;">0</strong></p>
    <button class="btn btn-ad" id="adBtn" onclick="onWatchAd()">
      <span class="btn-icon">▶</span> REKLAM İZLE & DEVAM ET
    </button>
    <button class="btn btn-premium" id="premiumBtn" onclick="onBuyPremium()">
      <span class="btn-icon">★</span> PREMIUM AL <span class="price">$2.99</span>
    </button>
    <button class="btn btn-tip hidden" id="tipBtn" onclick="onTip()">
      <span class="btn-icon">☕</span> KAHVE ISMARLA
    </button>
    <button class="btn btn-secondary" onclick="startGame()">YENİDEN BAŞLA</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
/* =========================================================
   PLATFORM DETECTION
   - mobile: Capacitor native app (iOS/Android)
   - portal: HTML5 game portal (Crazy Games, Poki, GameMonetize, vb.)
   - web:    Kendi web sürümü (itch.io, GitHub Pages, custom domain)
   ========================================================= */
const Platform = {
  isMobile: false, isPortal: false, isOwnWeb: true,
  detect() {
    this.isMobile = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
    const ref  = (document.referrer || '').toLowerCase();
    const host = (window.location.hostname || '').toLowerCase();
    const portalSDK = !!(
      (window.CrazyGames && window.CrazyGames.SDK) ||
      window.PokiSDK || window.gdsdk || window.GameDistribution
    );
    const portalRegex = /crazygames|poki\.com|gamedistribution|gamemonetize|y8\.com|newgrounds|coolmathgames/;
    this.isPortal  = !this.isMobile && (portalSDK || portalRegex.test(ref) || portalRegex.test(host));
    this.isOwnWeb  = !this.isMobile && !this.isPortal;
  },
  mode() { return this.isMobile ? 'mobile' : (this.isPortal ? 'portal' : 'web'); }
};
Platform.detect();

/* =========================================================
   MONETIZATION MODULE
   - mobile: AdMob (rewarded) + Apple/Google IAP (premium)
   - portal: Portal SDK (Crazy Games / Poki) rewarded ad, IAP yok
   - web:    Reklam yok, IAP yok, opsiyonel tip jar (Ko-fi)
   ========================================================= */
const Monetization = {
  isPremium: false,
  adLoaded: false,
  isNative: false, // backward compat — Platform.isMobile ile aynı

  AD_UNIT_REWARDED: 'ca-app-pub-3940256099942544/5224354917', // AdMob TEST ID — store öncesi kendi ID'inle değiştir
  PRODUCT_ID_PREMIUM: 'sky_jumper_premium_v1',
  TIP_URL: 'https://ko-fi.com/skyjumper', // Web tip jar — kendi Ko-fi/BMC link'inle değiştir

  async init() {
    this.isPremium = localStorage.getItem('skyJumperPremium') === '1';
    this.isNative = Platform.isMobile;
    console.log('[Monetization] Platform mode:', Platform.mode());
    this.updateUI();

    if (Platform.isMobile) {
      await this.initAdMob();
      await this.initIAP();
    } else if (Platform.isPortal) {
      await this.initPortalSDK();
    } else {
      // Own web — sade mod, sadece oyun + opsiyonel tip jar
      console.log('[Monetization] Free web mode — no ads, optional tip jar');
    }
  },

  async initPortalSDK() {
    try {
      if (window.CrazyGames && window.CrazyGames.SDK) {
        await window.CrazyGames.SDK.init();
        console.log('[Portal] CrazyGames SDK ready');
        this.adLoaded = true;
      } else if (window.PokiSDK) {
        await window.PokiSDK.init();
        console.log('[Portal] Poki SDK ready');
        this.adLoaded = true;
      } else if (window.gdsdk) {
        console.log('[Portal] GameDistribution SDK detected');
        this.adLoaded = true;
      }
    } catch (e) { console.warn('[Portal] SDK init failed:', e); }
  },

  updateUI() {
    const adBtn = document.getElementById('adBtn');
    const premiumBtn = document.getElementById('premiumBtn');
    const tipBtn = document.getElementById('tipBtn');
    const badge = document.getElementById('premiumBadge');

    // Premium badge sadece mobil + premium aktif iken görünür
    badge.classList.toggle('active', this.isPremium && Platform.isMobile);

    if (Platform.isMobile) {
      // FULL FREEMIUM
      adBtn.classList.remove('hidden');
      if (this.isPremium) {
        adBtn.innerHTML = '<span class="btn-icon">★</span> DEVAM ET (PREMIUM)';
        premiumBtn.classList.add('hidden');
      } else {
        adBtn.innerHTML = '<span class="btn-icon">▶</span> REKLAM İZLE & DEVAM ET';
        premiumBtn.classList.remove('hidden');
      }
      if (tipBtn) tipBtn.classList.add('hidden');
    } else if (Platform.isPortal) {
      // PORTAL — sadece rewarded ad, IAP yok, tip yok
      adBtn.classList.remove('hidden');
      adBtn.innerHTML = '<span class="btn-icon">▶</span> REKLAM İZLE & DEVAM ET';
      premiumBtn.classList.add('hidden');
      if (tipBtn) tipBtn.classList.add('hidden');
    } else {
      // OWN WEB — sade, opsiyonel tip jar
      adBtn.classList.add('hidden');
      premiumBtn.classList.add('hidden');
      if (tipBtn) tipBtn.classList.remove('hidden');
    }
  },

  async initAdMob() {
    try {
      const { AdMob } = window.Capacitor.Plugins;
      if (!AdMob) return;
      await AdMob.initialize({
        requestTrackingAuthorization: true,
        initializeForTesting: true
      });
      console.log('[AdMob] initialized');
      this.preloadRewardedAd();
    } catch (e) {
      console.warn('[AdMob] init failed:', e);
    }
  },

  async preloadRewardedAd() {
    try {
      const { AdMob } = window.Capacitor.Plugins;
      await AdMob.prepareRewardVideoAd({ adId: this.AD_UNIT_REWARDED });
      this.adLoaded = true;
    } catch (e) {
      console.warn('[AdMob] preload failed:', e);
      this.adLoaded = false;
    }
  },

  async initIAP() {
    try {
      // Kullanıcı RevenueCat veya cordova-plugin-purchase ekleyebilir
      // Şimdilik Capacitor üzerinden Apple/Google StoreKit'e doğrudan köprü kuruyoruz
      const restored = localStorage.getItem('skyJumperPremium') === '1';
      if (restored) this.isPremium = true;
      console.log('[IAP] hazır (gerçek IAP plugin\'i App Store Connect/Play Console kurulumu gerektirir)');
    } catch (e) {
      console.warn('[IAP] init failed:', e);
    }
  },

  async showRewardedAd() {
    if (this.isPremium) return true;

    // Mobile: AdMob native rewarded
    if (Platform.isMobile && this.adLoaded) {
      try {
        const { AdMob } = window.Capacitor.Plugins;
        const result = await AdMob.showRewardVideoAd();
        this.adLoaded = false;
        this.preloadRewardedAd();
        return !!result;
      } catch (e) {
        console.warn('[AdMob] show failed:', e);
        showToast('Reklam yüklenemedi');
        return false;
      }
    }

    // Portal: their SDK rewarded
    if (Platform.isPortal) {
      try {
        if (window.CrazyGames && window.CrazyGames.SDK && window.CrazyGames.SDK.ad) {
          await window.CrazyGames.SDK.ad.requestAd('rewarded');
          return true;
        }
        if (window.PokiSDK && window.PokiSDK.rewardedBreak) {
          const result = await window.PokiSDK.rewardedBreak();
          return result !== false;
        }
        if (window.gdsdk && window.gdsdk.showAd) {
          await window.gdsdk.showAd('rewarded');
          return true;
        }
      } catch (e) {
        console.warn('[Portal] rewarded ad failed:', e);
        showToast('Reklam yüklenemedi');
        return false;
      }
    }

    // Own web — fake demo (gerçekte web'de revive butonu zaten gizli olacak)
    return await this.simulateAd();
  },

  simulateAd() {
    return new Promise(resolve => {
      const overlay = document.createElement('div');
      overlay.className = 'ad-overlay';
      overlay.innerHTML = `
        <div class="ad-content">
          <div class="ad-label">Reklam · Demo</div>
          <div class="ad-mock">🎮</div>
          <div class="ad-title">Harika Bir Oyun!</div>
          <div class="ad-sub">Tarayıcı modunda sahte reklam — gerçek build'de AdMob ödüllü reklamı oynar.</div>
          <div class="ad-timer">Bekle: <span id="adT">3</span>s</div>
        </div>
      `;
      document.body.appendChild(overlay);
      let t = 3;
      const tick = setInterval(() => {
        t--;
        const el = overlay.querySelector('#adT');
        if (el) el.textContent = t;
        if (t <= 0) {
          clearInterval(tick);
          overlay.remove();
          resolve(true);
        }
      }, 1000);
    });
  },

  async purchasePremium() {
    if (this.isPremium) return true;

    if (this.isNative) {
      try {
        showToast('Satın alma başlatılıyor…');
        // Gerçek IAP akışı buraya: StoreKit / Play Billing
        // Plugin yüklendiğinde bu kod aktif olur
        await new Promise(r => setTimeout(r, 800));
      } catch (e) {
        console.warn('[IAP] purchase failed:', e);
        showToast('Satın alma başarısız');
        return false;
      }
    } else {
      const ok = confirm('DEMO MOD\n\nGerçek build\'de Apple/Google ödeme ekranı açılır.\n\n$2.99 satın alımını simüle etmek için Tamam\'a basın.');
      if (!ok) return false;
    }

    this.isPremium = true;
    localStorage.setItem('skyJumperPremium', '1');
    this.updateUI();
    showToast('★ Premium aktif! Sınırsız continue açıldı');
    return true;
  }
};

/* =========================================================
   AUDIO MODULE - Web Audio API procedural sound
   ========================================================= */
const Sfx = {
  ctx: null, master: null, enabled: true, bgTimer: null, bgChordIdx: 0,

  init() {
    if (this.ctx) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.master = this.ctx.createGain();
      this.master.gain.value = 0.55;
      this.master.connect(this.ctx.destination);
    } catch (e) { console.warn('AudioContext unavailable', e); }
  },

  resume() {
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  },

  tone({ freq, freq2, dur = 0.15, type = 'sine', vol = 0.15, attack = 0.005, delay = 0 }) {
    if (!this.ctx || !this.enabled) return;
    const t0 = this.ctx.currentTime + delay;
    const t1 = t0 + dur;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if (freq2) osc.frequency.exponentialRampToValueAtTime(Math.max(20, freq2), t1);
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(vol, t0 + attack);
    gain.gain.exponentialRampToValueAtTime(0.0001, t1);
    osc.connect(gain); gain.connect(this.master);
    osc.start(t0); osc.stop(t1 + 0.05);
  },

  noise({ dur = 0.1, vol = 0.08, hp = 800 } = {}) {
    if (!this.ctx || !this.enabled) return;
    const t0 = this.ctx.currentTime;
    const n = Math.floor(this.ctx.sampleRate * dur);
    const buffer = this.ctx.createBuffer(1, n, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < n; i++) data[i] = Math.random() * 2 - 1;
    const src = this.ctx.createBufferSource(); src.buffer = buffer;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'highpass'; filter.frequency.value = hp;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(vol, t0);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(filter); filter.connect(gain); gain.connect(this.master);
    src.start(t0);
  },

  jump()    { this.tone({ freq: 380, freq2: 620, dur: 0.10, type: 'square', vol: 0.07 }); },
  bigJump() {
    // Triumphant double-tone — yay platformu için
    this.tone({ freq: 330, freq2: 990, dur: 0.20, type: 'square',   vol: 0.11 });
    this.tone({ freq: 660, freq2: 1320, dur: 0.18, type: 'triangle', vol: 0.07, delay: 0.09 });
  },
  break()   { this.noise({ dur: 0.18, vol: 0.10, hp: 1200 });
              this.tone({ freq: 220, freq2: 70, dur: 0.20, type: 'sawtooth', vol: 0.06 }); },
  death()   {
    this.tone({ freq: 660, freq2: 110, dur: 0.55, type: 'sawtooth', vol: 0.18 });
    this.tone({ freq: 330, freq2: 60,  dur: 0.70, type: 'sine',     vol: 0.10, delay: 0.05 });
  },
  fall()    {
    this.tone({ freq: 440, freq2: 90, dur: 0.85, type: 'sine',     vol: 0.10 });
    this.tone({ freq: 220, freq2: 50, dur: 0.90, type: 'triangle', vol: 0.08, delay: 0.10 });
  },

  // Ambient pad chord progression — yumuşak, tekrarlayan
  startBg() {
    if (!this.ctx || this.bgTimer) return;
    const chords = [
      [130.81, 196.00, 261.63, 329.63], // Cmaj
      [110.00, 164.81, 220.00, 277.18], // Am
      [ 98.00, 146.83, 196.00, 246.94], // G
      [174.61, 220.00, 261.63, 349.23]  // F lift
    ];
    const playOne = () => {
      if (!this.ctx) return;
      const t0 = this.ctx.currentTime;
      const dur = 4.0;
      const gain = this.ctx.createGain();
      gain.gain.setValueAtTime(0, t0);
      gain.gain.linearRampToValueAtTime(0.045, t0 + 0.7);
      gain.gain.linearRampToValueAtTime(0, t0 + dur - 0.3);
      gain.connect(this.master);
      chords[this.bgChordIdx].forEach(f => {
        const osc = this.ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = f;
        osc.connect(gain);
        osc.start(t0); osc.stop(t0 + dur);
      });
      this.bgChordIdx = (this.bgChordIdx + 1) % chords.length;
    };
    playOne();
    this.bgTimer = setInterval(playOne, 3700);
  },
  stopBg() { if (this.bgTimer) { clearInterval(this.bgTimer); this.bgTimer = null; } }
};

function showToast(msg, ms = 2400) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove('show'), ms);
}

/* =========================================================
   GAME
   ========================================================= */
(function(){
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const W = 400, H = 640;
  canvas.width = W;
  canvas.height = H;
  const HIGH_KEY = 'skyJumperHigh';

  let player, platforms, particles, stars, score, highScore, cameraY, keys, running, frame;
  let canRevive = false; // bu round'ta tek seferlik ücretsiz revive (premium ise sınırsız)

  function reset() {
    player = { x: W/2 - 18, y: H - 120, w: 36, h: 36, vx: 0, vy: -14, trail: [], rot: 0, invuln: 0, deathBy: null };
    platforms = [];
    particles = [];
    stars = [];
    score = 0;
    cameraY = 0;
    keys = {};
    frame = 0;
    canRevive = true;

    for (let i = 0; i < 80; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H * 4 - H * 2,
        r: Math.random() * 1.5 + 0.3,
        a: Math.random() * Math.PI * 2,
        s: 0.4 + Math.random() * 0.8,
        depth: 0.2 + Math.random() * 0.8
      });
    }

    platforms.push({ x: W/2 - 55, y: H - 50, w: 110, h: 14, type: 'normal' });
    let y = H - 50;
    for (let i = 1; i < 16; i++) {
      y -= 50 + Math.random() * 25;
      spawnPlatform(y, true);
    }

    highScore = parseInt(localStorage.getItem(HIGH_KEY) || '0', 10);
    document.getElementById('high').textContent = highScore;
    document.getElementById('score').textContent = '0';
  }

  function revive() {
    // Mevcut camera view'in ortasında, altına 3 güvenli platform koy
    const baseY = cameraY + H * 0.55;
    platforms.push({ x: W/2 - 60, y: baseY, w: 120, h: 14, type: 'normal', pulse: 0 });
    platforms.push({ x: 30, y: baseY + 80, w: 90, h: 14, type: 'normal', pulse: 0 });
    platforms.push({ x: W - 120, y: baseY + 80, w: 90, h: 14, type: 'normal', pulse: 0 });

    player.x = W/2 - player.w/2;
    player.y = baseY - 60;
    player.vx = 0;
    player.vy = -8;
    player.invuln = 60; // ~1 saniye

    // Burst efekti
    for (let i = 0; i < 30; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 2 + Math.random() * 6;
      particles.push({
        x: player.x + player.w/2,
        y: player.y + player.h/2,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp,
        life: 1, color: '#00ffff', size: 3 + Math.random() * 3
      });
    }

    document.getElementById('over').classList.add('hidden');
    player.deathBy = null;
    Sfx.startBg();
    running = true;
    requestAnimationFrame(loop);
  }

  function spawnPlatform(y, easy) {
    let type = 'normal';
    if (!easy) {
      // Her 5K puanda breakable +5%, 50K'da %60'ta sabit
      const steps = Math.min(10, Math.floor(score / 5000));
      const breakablePct = 0.10 + steps * 0.05; // 10% → 60%
      const springPct = 0.10;
      const movingPct = 0.20;
      const deathPct = score >= 50000 ? 0.03 : 0; // 50K+ ölüm çubuğu (tek tük ~%3)
      const r = Math.random();
      if (r < deathPct) type = 'death';
      else if (r < deathPct + springPct) type = 'spring';
      else if (r < deathPct + springPct + movingPct) type = 'moving';
      else if (r < deathPct + springPct + movingPct + breakablePct) type = 'breakable';
    }
    // Ölüm çubukları biraz daha uzun olsun (sürpriz değil, görünür tehlike)
    const w = type === 'death' ? 95 : 75;
    platforms.push({
      x: 18 + Math.random() * (W - w - 18),
      y: y, w: w, h: 12, type: type,
      vx: type === 'moving' ? (Math.random() > 0.5 ? 1.6 : -1.6) : 0,
      broken: false, breakAnim: 0,
      pulse: Math.random() * Math.PI * 2
    });
  }

  function burst(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 1 + Math.random() * 5;
      particles.push({
        x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 1,
        life: 1, color, size: 2 + Math.random() * 3
      });
    }
  }

  function update() {
    if (!running) return;
    frame++;
    if (player.invuln > 0) player.invuln--;

    let moveX = 0;
    if (keys.left) moveX = -1;
    if (keys.right) moveX = 1;
    if (keys.touchX !== undefined) {
      const target = keys.touchX - player.w / 2;
      const diff = target - player.x;
      moveX = Math.max(-1, Math.min(1, diff / 50));
    }

    player.vx = moveX * 7;
    player.x += player.vx;
    player.rot += player.vx * 0.04;

    if (player.x + player.w < 0) player.x = W;
    if (player.x > W) player.x = -player.w;

    player.vy += 0.45;
    if (player.vy > 16) player.vy = 16;
    player.y += player.vy;

    player.trail.push({ x: player.x + player.w/2, y: player.y + player.h/2, life: 1 });
    if (player.trail.length > 14) player.trail.shift();
    player.trail.forEach(t => t.life *= 0.88);

    // Ölüm çubuğu collision (her yönden) — landing'ten ÖNCE
    if (player.invuln === 0) {
      for (const p of platforms) {
        if (p.type !== 'death' || p.broken) continue;
        if (player.x < p.x + p.w && player.x + player.w > p.x &&
            player.y < p.y + p.h && player.y + player.h > p.y) {
          Sfx.death();
          burst(player.x + player.w/2, player.y + player.h/2, '#ff0033', 24);
          player.deathBy = 'spike';
          endGame();
          return;
        }
      }
    }

    const targetCameraY = player.y - H * 0.4;
    if (targetCameraY < cameraY) {
      const climbed = cameraY - targetCameraY;
      cameraY = targetCameraY;
      // Skor çarpanı: 0 puanda 1.0x, 50K+ puanda 3.0x
      const scoreMult = 1 + Math.min(2, score / 50000 * 2);
      score += Math.floor(climbed * scoreMult);
    }

    platforms.forEach(p => {
      p.pulse += 0.05;
      if (p.type === 'moving' && !p.broken) {
        p.x += p.vx;
        if (p.x < 10) { p.x = 10; p.vx = Math.abs(p.vx); }
        if (p.x + p.w > W - 10) { p.x = W - 10 - p.w; p.vx = -Math.abs(p.vx); }
      }
      if (p.broken) p.breakAnim += 0.08;
    });

    if (player.vy > 0) {
      for (const p of platforms) {
        if (p.broken || p.type === 'death') continue;
        const px = player.x + player.w/2;
        if (px > p.x && px < p.x + p.w) {
          const py = player.y + player.h;
          if (py > p.y && py < p.y + p.h + player.vy + 4) {
            if (p.type === 'spring') {
              player.vy = -24;
              burst(p.x + p.w/2, p.y, '#ffd700', 14);
              Sfx.bigJump();
            } else {
              player.vy = -13;
              const c = p.type === 'moving' ? '#00ffff' : (p.type === 'breakable' ? '#ff4080' : '#a78bfa');
              burst(p.x + p.w/2, p.y, c, 6);
              Sfx.jump();
            }
            if (p.type === 'breakable') {
              p.broken = true;
              burst(p.x + p.w/2, p.y, '#ff4080', 12);
              Sfx.break();
            }
            player.y = p.y - player.h;
            break;
          }
        }
      }
    }

    particles.forEach(pt => {
      pt.x += pt.vx;
      pt.y += pt.vy;
      pt.vy += 0.3;
      pt.vx *= 0.96;
      pt.life -= 0.035;
    });
    particles = particles.filter(p => p.life > 0);

    platforms = platforms.filter(p => p.y < cameraY + H + 100);

    let highest = Infinity;
    for (const p of platforms) if (p.y < highest) highest = p.y;
    while (highest > cameraY - H * 0.6) {
      highest -= 48 + Math.random() * 32;
      spawnPlatform(highest, false);
    }

    document.getElementById('score').textContent = score;

    if (player.y - cameraY > H + 80 && player.invuln === 0) {
      if (!player.deathBy) { player.deathBy = 'fall'; Sfx.fall(); }
      endGame();
    }
  }

  function drawPlatform(p) {
    const y = p.y - cameraY;
    if (y < -30 || y > H + 30) return;

    // Ölüm çubuğu — özel çizim
    if (p.type === 'death') {
      const pulse = 0.85 + Math.sin(p.pulse * 2.5) * 0.15;
      ctx.shadowBlur = 26 * pulse;
      ctx.shadowColor = '#ff0033';
      const grad = ctx.createLinearGradient(p.x, y, p.x, y + p.h);
      grad.addColorStop(0, '#ff3355');
      grad.addColorStop(0.5, '#660011');
      grad.addColorStop(1, '#ff3355');
      ctx.fillStyle = grad;
      roundRect(p.x, y, p.w, p.h, 3); ctx.fill();
      ctx.shadowBlur = 0;
      // Üstte sivri uçlar
      ctx.fillStyle = '#ff5577';
      ctx.beginPath();
      for (let i = 4; i < p.w - 2; i += 8) {
        ctx.moveTo(p.x + i, y);
        ctx.lineTo(p.x + i + 4, y - 7);
        ctx.lineTo(p.x + i + 8, y);
      }
      ctx.closePath(); ctx.fill();
      // Tehlike çizgileri
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      for (let i = 0; i < p.w; i += 14) {
        ctx.fillRect(p.x + i, y + 4, 7, 4);
      }
      // Kafatası işareti
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('☠', p.x + p.w/2, y + p.h/2 + 1);
      ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
      return;
    }

    let color = '#a78bfa', glow = '#7c3aed';
    if (p.type === 'spring') { color = '#ffd700'; glow = '#ff9500'; }
    else if (p.type === 'moving') { color = '#00ffff'; glow = '#0080ff'; }
    else if (p.type === 'breakable') { color = '#ff4080'; glow = '#ff0066'; }

    if (p.broken) {
      ctx.globalAlpha = Math.max(0, 1 - p.breakAnim);
      ctx.fillStyle = color;
      const off = p.breakAnim * 30;
      ctx.fillRect(p.x - off, y + off, p.w/2, p.h);
      ctx.fillRect(p.x + p.w/2 + off, y + off, p.w/2, p.h);
      ctx.globalAlpha = 1;
      return;
    }

    const pulse = 0.85 + Math.sin(p.pulse) * 0.15;
    ctx.shadowBlur = 20 * pulse;
    ctx.shadowColor = glow;
    const grad = ctx.createLinearGradient(p.x, y, p.x, y + p.h);
    grad.addColorStop(0, color);
    grad.addColorStop(1, glow);
    ctx.fillStyle = grad;
    roundRect(p.x, y, p.w, p.h, 6); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    roundRect(p.x + 4, y + 2, p.w - 8, 2, 1); ctx.fill();

    if (p.type === 'spring') {
      ctx.fillStyle = '#fff';
      ctx.fillRect(p.x + p.w/2 - 8, y - 4, 16, 4);
      ctx.fillRect(p.x + p.w/2 - 6, y - 7, 12, 3);
    }
    if (p.type === 'moving') {
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      const cx = p.x + p.w/2;
      ctx.beginPath();
      if (p.vx > 0) { ctx.moveTo(cx + 12, y + p.h/2); ctx.lineTo(cx + 6, y + 3); ctx.lineTo(cx + 6, y + p.h - 3); }
      else { ctx.moveTo(cx - 12, y + p.h/2); ctx.lineTo(cx - 6, y + 3); ctx.lineTo(cx - 6, y + p.h - 3); }
      ctx.closePath(); ctx.fill();
    }
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function draw() {
    ctx.fillStyle = '#0f0c29';
    ctx.fillRect(0, 0, W, H);
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, 'rgba(48,43,99,0.4)');
    bgGrad.addColorStop(1, 'rgba(36,36,62,0.4)');
    ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, W, H);

    stars.forEach(s => {
      const sy = ((s.y - cameraY * s.depth) % (H * 2) + H * 2) % (H * 2) - H * 0.5;
      if (sy < -10 || sy > H + 10) return;
      s.a += 0.02 * s.s;
      const tw = 0.4 + Math.sin(s.a) * 0.3;
      ctx.fillStyle = `rgba(255,255,255,${tw * s.depth})`;
      ctx.beginPath(); ctx.arc(s.x, sy, s.r, 0, Math.PI * 2); ctx.fill();
    });

    platforms.forEach(drawPlatform);

    player.trail.forEach(t => {
      const ty = t.y - cameraY;
      ctx.fillStyle = `rgba(0,255,255,${t.life * 0.4})`;
      ctx.beginPath(); ctx.arc(t.x, ty, 10 * t.life, 0, Math.PI * 2); ctx.fill();
    });

    const px = player.x;
    const py = player.y - cameraY;
    const cx = px + player.w/2, cy = py + player.h/2;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(Math.sin(player.rot) * 0.15);

    if (player.invuln > 0 && Math.floor(player.invuln / 4) % 2 === 0) {
      ctx.shadowBlur = 35;
      ctx.shadowColor = '#ffd700';
    } else {
      ctx.shadowBlur = 25;
      ctx.shadowColor = '#00ffff';
    }
    const pg = ctx.createRadialGradient(-4, -4, 4, 0, 0, 20);
    pg.addColorStop(0, '#ffffff');
    pg.addColorStop(0.4, Monetization.isPremium ? '#ffd700' : '#00ffff');
    pg.addColorStop(1, Monetization.isPremium ? '#ff9500' : '#0066ff');
    ctx.fillStyle = pg;
    ctx.beginPath(); ctx.arc(0, 0, 17, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;

    const lookX = Math.max(-2, Math.min(2, player.vx * 0.3));
    const lookY = Math.max(-2, Math.min(2, player.vy * 0.15));
    ctx.fillStyle = '#0a0a1f';
    ctx.beginPath();
    ctx.arc(-6 + lookX, -2 + lookY, 3.5, 0, Math.PI * 2);
    ctx.arc(6 + lookX, -2 + lookY, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-5 + lookX, -3 + lookY, 1.2, 0, Math.PI * 2);
    ctx.arc(7 + lookX, -3 + lookY, 1.2, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = '#0a0a1f';
    ctx.lineWidth = 1.8;
    if (player.vy < -18) {
      // Yay zıplaması — kahkaha (geniş açık ağız + dil)
      ctx.fillStyle = '#0a0a1f';
      ctx.beginPath();
      ctx.ellipse(0, 7, 5.5, 4.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff4080';
      ctx.beginPath();
      ctx.arc(0, 9, 2.5, 0, Math.PI);
      ctx.fill();
    } else if (player.vy < -5) {
      // Normal zıplama — gülen ağız (U şekli)
      ctx.beginPath();
      ctx.arc(0, 5, 4.5, 0, Math.PI);
      ctx.stroke();
    } else if (player.vy > 8) {
      // Hızlı düşüş — korkmuş/üzgün ağız (ters U)
      ctx.beginPath();
      ctx.arc(0, 9, 4, 0, Math.PI, true);
      ctx.stroke();
      // Gözyaşı/ter damlası
      ctx.fillStyle = 'rgba(135,206,250,0.85)';
      ctx.beginPath();
      ctx.arc(-7, 4, 1.5, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Normal — düz çizgi
      ctx.beginPath();
      ctx.moveTo(-3, 7); ctx.lineTo(3, 7);
      ctx.stroke();
    }
    ctx.restore();

    particles.forEach(pt => {
      const hex = pt.color.substring(1);
      const r = parseInt(hex.substring(0,2),16);
      const g = parseInt(hex.substring(2,4),16);
      const b = parseInt(hex.substring(4,6),16);
      ctx.fillStyle = `rgba(${r},${g},${b},${pt.life})`;
      ctx.shadowBlur = 8; ctx.shadowColor = pt.color;
      ctx.beginPath(); ctx.arc(pt.x, pt.y - cameraY, pt.size * pt.life, 0, Math.PI * 2); ctx.fill();
    });
    ctx.shadowBlur = 0;
  }

  function loop() {
    update(); draw();
    if (running) requestAnimationFrame(loop);
  }

  function endGame() {
    running = false;
    Sfx.stopBg();
    if (score > highScore) {
      highScore = score;
      localStorage.setItem(HIGH_KEY, score);
      document.getElementById('badge').textContent = 'YENİ REKOR';
      document.getElementById('badge').classList.add('gold');
      document.getElementById('overTitle').innerHTML = 'YENİ<br>REKOR';
    } else {
      document.getElementById('badge').textContent = 'Game Over';
      document.getElementById('badge').classList.remove('gold');
      document.getElementById('overTitle').innerHTML = 'GAME<br>OVER';
    }
    document.getElementById('finalScore').textContent = score;

    // Mod-aware buton durumu
    Monetization.updateUI();
    const adBtn = document.getElementById('adBtn');
    if (Platform.isOwnWeb) {
      // Web modunda zaten updateUI() ad butonunu gizledi — bir şey yapma
    } else if (Monetization.isPremium || canRevive) {
      adBtn.disabled = false;
    } else {
      adBtn.disabled = true;
      adBtn.innerHTML = '<span class="btn-icon">⊘</span> BU OYUNDA REVIVE BİTTİ';
    }

    document.getElementById('over').classList.remove('hidden');
  }

  window.startGame = function() {
    document.getElementById('start').classList.add('hidden');
    document.getElementById('over').classList.add('hidden');
    document.getElementById('badge').classList.remove('gold');
    Sfx.init();
    Sfx.resume();
    Sfx.startBg();
    reset();
    Monetization.updateUI();
    running = true;
    requestAnimationFrame(loop);
  };

  window.onWatchAd = async function() {
    if (!Monetization.isPremium && !canRevive) return;
    const ok = await Monetization.showRewardedAd();
    if (ok) {
      if (!Monetization.isPremium) canRevive = false;
      revive();
      showToast('Devam!');
    }
  };

  window.onBuyPremium = async function() {
    const ok = await Monetization.purchasePremium();
    if (ok) {
      // Premium alındıktan sonra hemen ücretsiz revive
      revive();
    }
  };

  window.onTip = function() {
    try { window.open(Monetization.TIP_URL, '_blank', 'noopener,noreferrer'); }
    catch (e) { showToast('Link açılamadı'); }
  };

  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
  });
  window.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
  });

  function getTouchX(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return (t.clientX - rect.left) * (W / rect.width);
  }
  canvas.addEventListener('touchstart', e => { e.preventDefault(); keys.touchX = getTouchX(e); }, { passive: false });
  canvas.addEventListener('touchmove', e => { e.preventDefault(); keys.touchX = getTouchX(e); }, { passive: false });
  canvas.addEventListener('touchend', () => { keys.touchX = undefined; });
  canvas.addEventListener('mousedown', e => { keys.touchX = getTouchX(e); });
  canvas.addEventListener('mousemove', e => { if (e.buttons) keys.touchX = getTouchX(e); });
  canvas.addEventListener('mouseup', () => { keys.touchX = undefined; });

  reset();
  draw();

  Monetization.init();
})();
</script>
</body>
</html>
